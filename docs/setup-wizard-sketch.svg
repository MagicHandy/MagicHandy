<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Segoe UI, Inter, system-ui, sans-serif">
  <!-- Setup wizard (#/setup) wireframe — colors are the real tokens from
       web/src/styles/tokens.css. Dashed azure boxes mark BRANDING SLOTS
       awaiting final assets (see docs/setup-wizard-design.md). -->
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b9dd9"/>
      <stop offset="1" stop-color="#3a5a7c"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2126"/>
      <stop offset="1" stop-color="#17191d"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="960" height="600" fill="#0e0f11"/>

  <!-- ===== left brand / progress rail ===== -->
  <rect x="16" y="16" width="232" height="568" rx="12" fill="#17191d" stroke="#2d3138"/>

  <!-- logo slot (final asset TBD) -->
  <rect x="40" y="40" width="56" height="56" rx="14" fill="url(#brand)"/>
  <text x="68" y="76" fill="#0b131c" font-size="28" font-weight="700" text-anchor="middle">M</text>
  <rect x="36" y="36" width="64" height="64" rx="16" fill="none" stroke="#5b9dd9" stroke-dasharray="5 4"/>
  <text x="110" y="60" fill="#5b9dd9" font-size="11" letter-spacing="1">LOGO SLOT</text>
  <text x="110" y="74" fill="#98a0a9" font-size="10">64 x 64 mark</text>

  <!-- wordmark slot -->
  <rect x="40" y="112" width="184" height="26" rx="6" fill="none" stroke="#5b9dd9" stroke-dasharray="5 4"/>
  <text x="48" y="129" fill="#eae9e4" font-size="15" font-weight="600">MagicHandy</text>
  <text x="176" y="129" fill="#5b9dd9" font-size="9" letter-spacing="1">WORDMARK</text>

  <!-- step list -->
  <g font-size="13">
    <circle cx="52" cy="176" r="9" fill="#4fc06d"/>
    <text x="52" y="180" fill="#08130c" font-size="10" font-weight="700" text-anchor="middle">✓</text>
    <text x="72" y="180" fill="#98a0a9">Welcome</text>

    <circle cx="52" cy="208" r="9" fill="#4fc06d"/>
    <text x="52" y="212" fill="#08130c" font-size="10" font-weight="700" text-anchor="middle">✓</text>
    <text x="72" y="212" fill="#98a0a9">Device</text>

    <rect x="32" y="226" width="200" height="28" rx="8" fill="rgba(91,157,217,0.16)"/>
    <rect x="32" y="226" width="3" height="28" rx="1.5" fill="#5b9dd9"/>
    <circle cx="52" cy="240" r="9" fill="none" stroke="#5b9dd9" stroke-width="2"/>
    <text x="52" y="244" fill="#5b9dd9" font-size="10" font-weight="700" text-anchor="middle">3</text>
    <text x="72" y="244" fill="#eae9e4" font-weight="600">LLM runtime</text>

    <circle cx="52" cy="272" r="9" fill="none" stroke="#3d434c" stroke-width="2"/>
    <text x="52" y="276" fill="#98a0a9" font-size="10" text-anchor="middle">4</text>
    <text x="72" y="276" fill="#98a0a9">LLM model</text>

    <circle cx="52" cy="304" r="9" fill="none" stroke="#3d434c" stroke-width="2"/>
    <text x="52" y="308" fill="#98a0a9" font-size="10" text-anchor="middle">5</text>
    <text x="72" y="308" fill="#98a0a9">Voice (optional)</text>

    <circle cx="52" cy="336" r="9" fill="none" stroke="#3d434c" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="52" y="340" fill="#98a0a9" font-size="10" text-anchor="middle">6</text>
    <text x="72" y="340" fill="#98a0a9">Port data</text>
    <text x="146" y="340" fill="#d8b66a" font-size="9">(if built)</text>

    <circle cx="52" cy="368" r="9" fill="none" stroke="#3d434c" stroke-width="2"/>
    <text x="52" y="372" fill="#98a0a9" font-size="10" text-anchor="middle">7</text>
    <text x="72" y="372" fill="#98a0a9">Finish</text>
  </g>

  <!-- rail footnote -->
  <text x="40" y="548" fill="#98a0a9" font-size="10">Every step is skippable.</text>
  <text x="40" y="564" fill="#98a0a9" font-size="10">v0.x.y — re-run from Settings</text>

  <!-- ===== main pane ===== -->
  <rect x="264" y="16" width="680" height="568" rx="12" fill="#17191d" stroke="#2d3138"/>

  <!-- hero band with art slot -->
  <rect x="264" y="16" width="680" height="96" rx="12" fill="url(#heroGlow)"/>
  <rect x="264" y="100" width="680" height="12" fill="#17191d"/>
  <text x="292" y="52" fill="#5b9dd9" font-size="11" font-weight="600" letter-spacing="2">STEP 3 OF 7</text>
  <text x="292" y="80" fill="#eae9e4" font-size="22" font-weight="650">Pick your model runtime</text>

  <!-- decorative device silhouette (echoes the motion visualizer) -->
  <g opacity="0.9">
    <rect x="806" y="34" width="26" height="64" rx="12" fill="#23272e" stroke="#3d434c"/>
    <rect x="836" y="44" width="7" height="44" rx="3.5" fill="#0d0f12" stroke="#2d3138"/>
    <rect x="833" y="56" width="13" height="12" rx="5" fill="#5b9dd9" opacity="0.85"/>
    <circle cx="815" cy="46" r="2.4" fill="#4fc06d"/>
  </g>
  <rect x="796" y="26" width="120" height="80" rx="10" fill="none" stroke="#5b9dd9" stroke-dasharray="5 4"/>
  <text x="856" y="120" fill="#5b9dd9" font-size="9" letter-spacing="1" text-anchor="middle">HERO ART SLOT</text>

  <!-- hardware probe chip -->
  <rect x="292" y="130" width="356" height="30" rx="8" fill="#1e2126" stroke="#2d3138"/>
  <circle cx="310" cy="145" r="4" fill="#4fc06d"/>
  <text x="322" y="149" fill="#eae9e4" font-size="12">Detected: NVIDIA GPU, 16 GiB — CUDA bundle fits</text>

  <!-- choice cards -->
  <!-- recommended (selected) -->
  <rect x="292" y="176" width="624" height="74" rx="8" fill="rgba(91,157,217,0.16)" stroke="#5b9dd9"/>
  <circle cx="316" cy="200" r="8" fill="none" stroke="#5b9dd9" stroke-width="2"/>
  <circle cx="316" cy="200" r="4" fill="#5b9dd9"/>
  <text x="336" y="198" fill="#eae9e4" font-size="14" font-weight="600">Prebuilt runtime — CUDA</text>
  <rect x="524" y="185" width="106" height="18" rx="4" fill="#5b9dd9"/>
  <text x="577" y="198" fill="#0b131c" font-size="10" font-weight="700" text-anchor="middle">RECOMMENDED</text>
  <text x="336" y="220" fill="#98a0a9" font-size="11.5">Checksummed download, no build tools. Size and license shown before anything downloads.</text>
  <text x="336" y="238" fill="#98a0a9" font-size="11.5">~380 MB · MIT · verified SHA-256</text>

  <rect x="292" y="262" width="624" height="52" rx="8" fill="#1e2126" stroke="#2d3138"/>
  <circle cx="316" cy="288" r="8" fill="none" stroke="#3d434c" stroke-width="2"/>
  <text x="336" y="284" fill="#eae9e4" font-size="14">I already use Ollama</text>
  <text x="336" y="303" fill="#98a0a9" font-size="11.5">Skip the managed runtime; scan and import from your Ollama library.</text>

  <rect x="292" y="326" width="624" height="52" rx="8" fill="#1e2126" stroke="#2d3138"/>
  <circle cx="316" cy="352" r="8" fill="none" stroke="#3d434c" stroke-width="2"/>
  <text x="336" y="348" fill="#eae9e4" font-size="14">Advanced: build from source</text>
  <text x="336" y="367" fill="#98a0a9" font-size="11.5">Pinned llama.cpp build on this machine. Installs compiler tooling; streaming log; cancellable.</text>

  <rect x="292" y="390" width="624" height="52" rx="8" fill="#1e2126" stroke="#2d3138"/>
  <circle cx="316" cy="416" r="8" fill="none" stroke="#3d434c" stroke-width="2"/>
  <text x="336" y="412" fill="#eae9e4" font-size="14">External server URL</text>
  <text x="336" y="431" fill="#98a0a9" font-size="11.5">Point at a llama.cpp or compatible server you run yourself.</text>

  <!-- consent line -->
  <text x="292" y="472" fill="#98a0a9" font-size="11">Nothing downloads or builds until you confirm on the next screen. You can change this later in Settings &gt; Model.</text>

  <!-- footer actions -->
  <line x1="292" y1="500" x2="916" y2="500" stroke="#2d3138"/>
  <rect x="292" y="518" width="86" height="38" rx="8" fill="#1e2126" stroke="#3d434c"/>
  <text x="335" y="542" fill="#eae9e4" font-size="13" text-anchor="middle">Back</text>
  <text x="672" y="542" fill="#98a0a9" font-size="13" text-anchor="end">Skip for now</text>
  <rect x="694" y="514" width="222" height="44" rx="8" fill="#5b9dd9"/>
  <text x="805" y="541" fill="#0b131c" font-size="14" font-weight="650" text-anchor="middle">Continue with CUDA bundle</text>
</svg>
