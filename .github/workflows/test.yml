name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l $(find cmd internal web -name '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: CGO-free build
        run: CGO_ENABLED=0 go build ./cmd/magichandy

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Component tests
        run: npm run test

      - name: Build
        run: npm run build

  installer:
    name: Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PowerShell 5.1 installer tests
        shell: powershell
        run: .\scripts\test-installer.ps1

  neucodec-encoder:
    name: NeuCodec encoder
    runs-on: windows-latest
    defaults:
      run:
        working-directory: workers/neucodec-encoder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        shell: powershell
        run: rustup toolchain install 1.94.0 --profile minimal --component rustfmt

      - name: Check formatting
        shell: powershell
        run: rustup run 1.94.0 cargo fmt -- --check

      - name: Check persistent NeuTTS runner formatting
        shell: powershell
        run: rustup run 1.94.0 rustfmt --check ..\neutts-runner\main.rs

      - name: Build release worker
        shell: powershell
        run: rustup run 1.94.0 cargo build --locked --release

      - name: Test worker
        shell: powershell
        run: rustup run 1.94.0 cargo test --locked --release

      - name: Verify release payload
        shell: powershell
        run: |
          if (-not (Test-Path .\target\release\magichandy-neucodec-encoder.exe)) { throw 'encoder executable is missing' }
          if (-not (Test-Path .\target\release\DirectML.dll)) { throw 'DirectML.dll is missing' }
          .\target\release\magichandy-neucodec-encoder.exe --help
