name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l $(find cmd internal web -name '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          golangci-lint run ./...

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: CGO-free build
        run: CGO_ENABLED=0 go build ./cmd/magichandy
