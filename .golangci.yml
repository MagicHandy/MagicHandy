version: "2"
run:
  tests: true
linters:
  enable:
    - depguard
    - funlen
    - gocyclo
    - gosec
    - revive
  settings:
    depguard:
      rules:
        httpapi-is-edge-only:
          files:
            - internal/config/**/*.go
            - internal/logging/**/*.go
            - internal/motion/**/*.go
            - internal/transport/**/*.go
            - internal/chat/**/*.go
            - internal/llm/**/*.go
            - internal/modes/**/*.go
            - internal/patterns/**/*.go
            - internal/voice/**/*.go
          deny:
            - pkg: github.com/mapledaemon/MagicHandy/internal/httpapi
              desc: HTTP API is an edge adapter; core packages must not depend on it.
        no-transport-from-semantic-clients:
          files:
            - internal/chat/**/*.go
            - internal/llm/**/*.go
            - internal/modes/**/*.go
            - internal/patterns/**/*.go
            - internal/voice/**/*.go
          deny:
            - pkg: github.com/mapledaemon/MagicHandy/internal/transport
              desc: Chat, LLM, modes, patterns, and voice produce semantic outputs and must not call transport.
        voice-never-touches-motion:
          files:
            - internal/voice/**/*.go
          deny:
            - pkg: github.com/mapledaemon/MagicHandy/internal/motion
              desc: Voice worker failures must stay out of the motion path (ADR 0003).
            - pkg: github.com/mapledaemon/MagicHandy/internal/chat
              desc: Voice integrates with chat at the HTTP edge, not by importing it.
            - pkg: github.com/mapledaemon/MagicHandy/internal/llm
              desc: Voice workers are separate processes; the LLM client is not their concern.
            - pkg: github.com/mapledaemon/MagicHandy/internal/modes
              desc: Voice must not drive autonomous modes directly.
        pure-go-core:
          files:
            - $all
          deny:
            - pkg: C
              desc: MagicHandy core must stay CGO-free.
    funlen:
      lines: 100
      statements: 60
    gocyclo:
      min-complexity: 20
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
